services:
  backend_orchestrator:
    build:
      context: ./backend_orchestrator
    container_name: backend_orchestrator
    ports:
      - "8080:8080"
    volumes:
      # Montaggio socket Docker per permettere alla lib docker-py di gestire i container host
      - /var/run/docker.sock:/var/run/docker.sock
      # Montaggio radice del progetto per la creazione da template (copia cartella per poi dare deploy asincrono, simulato nel python)
      - ./:/projects
    environment:
      - SERVICES_BASE_DIR=/projects
    restart: unless-stopped

  frontend_web:
    build:
      context: ./frontend_web
    container_name: frontend_web
    ports:
      - "80:80"
    depends_on:
      - backend_orchestrator
    restart: unless-stopped

  # Servizio di default istanziato all'avvio: il classificatore TrashNet
  trashnet_service_default:
    build:
      context: ./cv_service_trashnet
    container_name: trashnet_service_default
    ports:
      - "8000:8000"
    volumes:
      - trashnet_data:/app/data
    mem_limit: 1536m
    cpus: 1.0
    restart: unless-stopped

  # Interfaccia opzionale Gradio per testing rapido
  gradio_ui:
    build:
      context: ./gradio_ui
    container_name: gradio_ui
    ports:
      - "7860:7860"
    environment:
      - SERVICE_URL=http://trashnet_service_default:8000
    depends_on:
      - trashnet_service_default
    restart: unless-stopped

volumes:
  trashnet_data:
