name: CV Multi-Docker CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx fastapi uvicorn pydantic pyyaml docker torch torchvision datasets
        
    - name: Run Tests
      run: |
        PYTHONPATH=. pytest

    - name: Lint with flake8
      run: |
        # Ferma la build se ci sono errori bloccanti di sintassi Python
        flake8 template_service cv_service_trashnet backend_orchestrator gradio_ui --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Validate Docker Compose Configuration
      run: |
        docker compose config

  docker-build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    # LOGIN SU DOCKER HUB (necessari Secrets in GitHub repo!)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend Orchestrator
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend-orchestrator:latest ./backend_orchestrator
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend-orchestrator:latest

    - name: Build and Push Trashnet CV Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cv-service-trashnet:latest ./cv_service_trashnet
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cv-service-trashnet:latest

    - name: Build and Push Frontend UI
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend-web:latest ./frontend_web
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend-web:latest

    - name: Build e Push Artefatto
      uses: actions/upload-artifact@v4
      with:
        name: docker-compose-file
        path: docker-compose.yml
