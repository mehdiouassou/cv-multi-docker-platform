name: CV Multi-Docker CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-html httpx fastapi uvicorn pydantic pyyaml docker torch torchvision datasets python-multipart

    - name: Run Tests
      run: |
        mkdir -p reports
        PYTHONPATH=. pytest --html=reports/test_report.html --self-contained-html --junitxml=reports/test_results.xml -v

    - name: Lint with flake8
      run: |
        mkdir -p reports
        flake8 template_service cv_service_trashnet backend_orchestrator gradio_ui --count --select=E9,F63,F7,F82 --show-source --statistics --output-file=reports/flake8_report.txt || true
        flake8 template_service cv_service_trashnet backend_orchestrator gradio_ui --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Validate Docker Compose Configuration
      run: |
        docker compose config

    - name: Upload Test and Lint Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-and-lint-reports
        path: reports/

  docker-build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend Orchestrator
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend-orchestrator:latest ./backend_orchestrator
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend-orchestrator:latest

    - name: Build and Push Trashnet CV Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cv-service-trashnet:latest ./cv_service_trashnet
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cv-service-trashnet:latest

    - name: Build and Push Frontend UI
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend-web:latest ./frontend_web
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend-web:latest
