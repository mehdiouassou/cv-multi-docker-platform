<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony | CV Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel:hover {
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }
        .header-glass {
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-running { background-color: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-stopped { background-color: #ef4444; }
        .status-building { background-color: #f59e0b; animation: pulse 1.5s infinite; }
        
        /* Modal styling */
        #createModal {
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.7);
        }
        
        .progress-bar-bg { background-color: rgba(255,255,255,0.1); }
        .progress-bar-fill { background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.5s ease; }
    </style>
</head>
<body class="text-slate-200">

    <!-- Header -->
    <header class="header-glass sticky top-0 z-50 w-full px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-network-wired text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Symphony</h1>
                <p class="text-xs text-slate-400 font-medium">Computer Vision Orchestrator</p>
            </div>
        </div>
        <button onclick="openModal()" class="btn-primary px-5 py-2.5 rounded-xl font-medium text-sm flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Nuovo Servizio
        </button>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-6 flex flex-col justify-center">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-400 text-sm font-medium">Servizi Attivi</p>
                    <div class="p-2 bg-blue-500/10 rounded-lg text-blue-400"><i class="fa-solid fa-server"></i></div>
                </div>
                <h3 class="text-4xl font-bold" id="stat-active">0</h3>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-400 text-sm font-medium">Carico CPU Totale</p>
                    <div class="p-2 bg-purple-500/10 rounded-lg text-purple-400"><i class="fa-solid fa-microchip"></i></div>
                </div>
                <h3 class="text-4xl font-bold" id="stat-cpu">0%</h3>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-400 text-sm font-medium">Memoria Allocata</p>
                    <div class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400"><i class="fa-solid fa-memory"></i></div>
                </div>
                <h3 class="text-4xl font-bold" id="stat-mem">0 GB</h3>
            </div>
        </div>

        <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-layer-group text-blue-500"></i> Servizi in esecuzione
        </h2>

        <!-- Containers Grid -->
        <div id="containers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamic Content -->
            <div class="text-slate-500 col-span-3 text-center py-10">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
                <p>Connessione all'orchestratore in corso...</p>
            </div>
        </div>

    </main>

    <!-- Modal Create Service -->
    <div id="createModal" class="fixed inset-0 hidden items-center justify-center z-[100]">
        <div class="glass-panel w-full max-w-md p-8 transform transition-all scale-95 opacity-0 m-4" id="modalContent">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Genera Servizio</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            
            <form id="createForm" onsubmit="createService(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Nome Servizio</label>
                        <input type="text" id="svc-name" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" placeholder="es. anomalydetection">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Template Base</label>
                        <select id="svc-template" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                            <option value="template_service">Template Generico Computer Vision</option>
                            <option value="cv_service_trashnet">Classificatore Rifiuti TrashNet</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">CPU Cores</label>
                            <input type="number" id="svc-cpu" step="0.5" value="1.0" min="0.5" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Memoria (MB)</label>
                            <input type="number" id="svc-mem" value="512" min="128" step="128" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-medium text-sm text-slate-300 hover:text-white hover:bg-slate-800 transition-colors">Annulla</button>
                    <button type="submit" class="btn-primary px-6 py-2.5 rounded-xl font-medium text-sm flex items-center gap-2" id="submitBtn">
                        <i class="fa-solid fa-rocket"></i> Avvia Generazione
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script Application -->
    <script src="app.js"></script>
</body>
</html>
